<!DOCTYPE html>
<html>
<head>
    <title>Shopping Cart</title>

    <style>
        body{
            font-family:Arial;
            background:#f2f2f2;
            text-align:center;
        }

        h2{
            color:#333;
        }

        .product{
            width:250px;
            margin:15px auto;
            background:white;
            padding:15px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        button{
            padding:8px 15px;
            margin-top:10px;
            cursor:pointer;
        }

        input{
            width:50px;
            text-align:center;
        }

        #cart{
            margin-top:30px;
            background:white;
            width:350px;
            margin-left:auto;
            margin-right:auto;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }
    </style>
</head>

<body>

<h2>Shopping Cart</h2>

<div class="product">
    <h3>Laptop</h3>
    <p>Price: ₹50000</p>
    Quantity:
    <input type="number" id="laptopQty" value="1" min="1">
    <br>
    <button id="addLaptop" onclick="addProduct('Laptop',50000,'laptopQty')">Add to Cart</button>
</div>

<div class="product">
    <h3>Mobile</h3>
    <p>Price: ₹20000</p>
    Quantity:
    <input type="number" id="mobileQty" value="1" min="1">
    <br>
    <button id="addMobile" onclick="addProduct('Mobile',20000,'mobileQty')">Add to Cart</button>
</div>

<div class="product">
    <h3>Python Book</h3>
    <p>Price: ₹600</p>
    Quantity:
    <input type="number" id="bookQty" value="1" min="1">
    <br>
    <button id="addBook" onclick="addProduct('Python Book',600,'bookQty')">Add to Cart</button>
</div>

<div id="cart">
    <h2>Cart</h2>

    <div id="cartItems"></div>

    <h3 id="total">Total: ₹0</h3>

    <button id="updateCart" onclick="updateCart()">Update Cart</button>
</div>

<script>

let cart={};

function addProduct(name,price,qtyId){

    let qty=parseInt(document.getElementById(qtyId).value);

    cart[name]={
        price:price,
        qty:qty
    };

    displayCart();

}

function updateCart(){

    if(cart["Laptop"]){
        cart["Laptop"].qty=parseInt(document.getElementById("laptopQty").value);
    }

    if(cart["Mobile"]){
        cart["Mobile"].qty=parseInt(document.getElementById("mobileQty").value);
    }

    if(cart["Python Book"]){
        cart["Python Book"].qty=parseInt(document.getElementById("bookQty").value);
    }

    displayCart();

}

function displayCart(){

    let items="";

    let total=0;

    for(let product in cart){

        let subtotal=cart[product].price*cart[product].qty;

        total+=subtotal;

        items+=product+" x "+cart[product].qty+" = ₹"+subtotal+"<br>";

    }

    document.getElementById("cartItems").innerHTML=items;

    document.getElementById("total").innerHTML="Total: ₹"+total;

}

</script>

</body>
</html>
